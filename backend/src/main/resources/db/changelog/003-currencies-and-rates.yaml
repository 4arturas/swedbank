databaseChangeLog:
  - changeSet:
      id: 10
      author: sweedbank
      comment: Create exchange_rates table
      changes:
        - createTable:
            tableName: exchange_rates
            remarks: Currency exchange rates
            columns:
              - column:
                  name: id
                  type: integer
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: from_currency_code
                  type: varchar(10)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_exchange_from
                    references: currencies(code)
              - column:
                  name: to_currency_code
                  type: varchar(10)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_exchange_to
                    references: currencies(code)
              - column:
                  name: rate
                  type: decimal(19,6)
                  constraints:
                    nullable: false
            uniqueConstraints:
              - uniqueConstraint:
                  columnNames: from_currency_code, to_currency_code
                  constraintName: uq_exchange_rate_pair

